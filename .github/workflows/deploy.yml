name: Deploy

on:
  push:
    branches: ["main"]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            # Change this to the folder where the repo is cloned on the VPS
            REPO_DIR="/root/projects/cong-duc-dinh-tan-kim"

            cd "$REPO_DIR"
            git fetch --all --prune
            git checkout main
            git pull --ff-only

            docker compose up -d --build
            docker image prune -f
